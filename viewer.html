<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理ビューワー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e42;
    --primary: #ff6b35;
    --primary-glow: rgba(255,107,53,0.25);
    --accent: #7c6ff7;
    --accent-glow: rgba(124,111,247,0.2);
    --green: #2ecc71;
    --green-glow: rgba(46,204,113,0.15);
    --red: #e74c3c;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --card-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(124,111,247,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, rgba(255,107,53,0.06) 0%, transparent 60%);
  }

  /* ヘッダー */
  .header {
    padding: 36px 32px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(26,26,36,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem; letter-spacing: .12em;
    color: var(--primary);
    text-shadow: 0 0 30px var(--primary-glow);
    line-height: 1;
  }

  .logo span { color: var(--text); }

  /* 週セレクター */
  .week-selector {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .week-selector {
    display: flex; align-items: center; gap: 12px;
  }

  .week-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 50%; width: 40px; height: 40px;
    font-size: 1rem; cursor: pointer; color: var(--primary);
    font-weight: 700; display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s; flex-shrink: 0;
  }
  .week-btn:hover { background: var(--primary-glow); border-color: var(--primary); }

  .week-label-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    min-width: 200px;
  }

  .week-sel-label {
    font-size: .72rem; font-weight: 700; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
  }

  .week-sel-value {
    font-size: 1.05rem; font-weight: 900; color: var(--accent);
  }

  .week-deadline {
    font-size: .72rem; font-weight: 700;
    color: var(--primary); letter-spacing: .02em;
  }

  .week-deadline.over { color: var(--red); }

  /* メイン */
  .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* サマリーカード */
  .summary-strip {
    display: flex; gap: 14px; margin-bottom: 32px; flex-wrap: wrap;
  }

  .summary-card {
    flex: 1; min-width: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 20px;
    position: relative; overflow: hidden;
  }

  .summary-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }

  .summary-card.orange::before { background: var(--primary); }
  .summary-card.purple::before { background: var(--accent); }
  .summary-card.green::before  { background: var(--green); }

  .summary-card .sc-label {
    font-size: .75rem; font-weight: 700;
    color: var(--muted); letter-spacing: .1em;
    text-transform: uppercase; margin-bottom: 8px;
  }

  .summary-card .sc-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem; line-height: 1;
    color: var(--text);
  }

  .summary-card.orange .sc-value { color: var(--primary); }
  .summary-card.purple .sc-value { color: var(--accent); }
  .summary-card.green  .sc-value { color: var(--green); }

  /* 曜日グリッド */
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
  }

  @media (max-width: 860px) {
    .days-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 560px) {
    .days-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }

  .day-col:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .day-header {
    padding: 14px 16px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem; letter-spacing: .1em; line-height: 1;
  }

  .day-date {
    font-size: .75rem; color: var(--muted);
    margin-top: 2px; font-weight: 400;
  }

  .day-count {
    position: absolute; top: 10px; right: 12px;
    font-size: .7rem; font-weight: 900;
    background: var(--primary); color: #fff;
    border-radius: 50px; padding: 2px 8px;
    letter-spacing: .04em;
  }

  .day-count.zero {
    background: var(--border); color: var(--muted);
  }

  /* 曜日カラー */
  .day-sun .day-header { background: rgba(231,76,60,0.12); }
  .day-sun .day-name   { color: #e74c3c; }
  .day-sat .day-header { background: rgba(124,111,247,0.12); }
  .day-sat .day-name   { color: var(--accent); }
  .day-holiday .day-header { background: rgba(231,76,60,0.10); }
  .day-holiday .day-name   { color: #e74c3c; }
  .day-col:not(.day-sun):not(.day-sat):not(.day-holiday) .day-name { color: var(--text); }

  /* スタッフリスト */
  .staff-list {
    padding: 12px 10px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 60px;
  }

  .staff-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    animation: popIn .3s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.95) translateY(4px); }
    to   { opacity: 1; transform: none; }
  }

  .staff-name {
    font-size: .85rem; font-weight: 900;
    color: var(--text); margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }

  .staff-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    flex-shrink: 0;
  }

  .shift-time {
    font-size: .78rem; color: var(--accent);
    font-weight: 700; line-height: 1.6;
  }

  .no-staff {
    text-align: center; color: var(--muted);
    font-size: .8rem; padding: 16px 0;
    font-style: italic;
  }

  /* 備考バッジ */
  .remarks-badge {
    display: inline-block;
    background: rgba(255,107,53,0.15);
    color: var(--primary);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 6px;
    font-size: .65rem; padding: 1px 6px;
    margin-left: 4px; vertical-align: middle;
    cursor: pointer;
    transition: background .2s;
  }
  .remarks-badge:hover {
    background: rgba(255,107,53,0.35);
  }

  /* モーダル */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.show {
    opacity: 1; pointer-events: all;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 400px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    transform: scale(.92) translateY(10px);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.show .modal {
    transform: none;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-name {
    font-size: 1.2rem; font-weight: 900; color: var(--text);
  }
  .modal-close {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 50%; width: 32px; height: 32px;
    color: var(--muted); font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color .2s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-label {
    font-size: .75rem; font-weight: 700; color: var(--primary);
    letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px;
  }
  .modal-text {
    font-size: 1rem; color: var(--text);
    line-height: 1.8;
    background: var(--surface2);
    border-radius: 14px; padding: 16px 18px;
    border: 1px solid var(--border);
  }

  /* 空週メッセージ */
  .empty-msg {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 1.1rem;
  }

  /* データ貼り付けエリア */
  .paste-section {
    max-width: 1100px; margin: 0 auto 28px;
    padding: 0 24px;
  }

  details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }

  summary {
    padding: 16px 20px; cursor: pointer;
    font-weight: 700; font-size: .9rem;
    color: var(--muted); letter-spacing: .06em;
    list-style: none; user-select: none;
    display: flex; align-items: center; gap: 10px;
  }

  summary::-webkit-details-marker { display: none; }
  summary::before { content: '▶'; font-size: .7rem; transition: transform .2s; }
  details[open] summary::before { transform: rotate(90deg); }

  .paste-inner { padding: 0 20px 20px; }

  .paste-inner p { font-size: .85rem; color: var(--muted); margin-bottom: 10px; }

  textarea#csvInput {
    width: 100%; height: 120px;
    font-family: monospace; font-size: .8rem;
    background: var(--surface2); color: var(--text);
    border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px; resize: vertical; outline: none;
    transition: border-color .2s;
  }

  textarea#csvInput:focus { border-color: var(--accent); }

  .btn-parse {
    margin-top: 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 50px;
    padding: 10px 24px; font-size: .9rem; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: opacity .2s;
  }

  .btn-parse:hover { opacity: .85; }

  /* GAS連携ボタン */
  .gas-section {
    max-width: 1100px; margin: 0 auto 20px;
    padding: 0 24px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .gas-input {
    flex: 1; min-width: 200px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: .85rem; color: var(--text);
    background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 12px;
    padding: 10px 14px; outline: none; transition: border-color .2s;
  }

  .gas-input:focus { border-color: var(--primary); }
  .gas-input::placeholder { color: var(--muted); }

  .btn-fetch {
    background: var(--primary); color: #fff;
    border: none; border-radius: 50px;
    padding: 10px 24px; font-size: .9rem; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: opacity .2s;
    white-space: nowrap;
  }

  .btn-fetch:hover { opacity: .85; }

  .fetch-note {
    font-size: .75rem; color: var(--muted); width: 100%;
  }
</style>
</head>
<body>

<!-- 備考モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-name" id="modalName"></div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-label">📝 備考・コメント</div>
    <div class="modal-text" id="modalText"></div>
  </div>
</div>

<div class="header">
  <div class="header-inner">
    <div class="logo">SHIFT<span>VIEW</span></div>
    <div class="week-selector">
      <button class="week-btn" id="btnPrev">◀</button>
      <div class="week-label-wrap">
        <span class="week-sel-label">📅 対象週</span>
        <span class="week-sel-value" id="weekLabel">読み込み中...</span>
        <span class="week-deadline" id="weekDeadline"></span>
      </div>
      <button class="week-btn" id="btnNext">▶</button>
    </div>
  </div>
</div>

<!-- データ読み込みエリア -->
<div class="gas-section">
  <input class="gas-input" id="gasUrl" type="text"
    placeholder="スプレッドシートのデータを読み込む場合：GASのURLを貼り付け（任意）">
  <button class="btn-fetch" id="btnFetch">🔄 データ取得</button>
  <span class="fetch-note">※ GAS URLがなくても、下の「データを貼り付ける」からCSVを貼り付けて使えます</span>
</div>

<div class="paste-section">
  <details>
    <summary>📋 スプレッドシートからデータを貼り付ける</summary>
    <div class="paste-inner">
      <p>Googleスプレッドシートの「シフト」シートを全選択（Ctrl+A）→ コピー（Ctrl+C）して、下に貼り付けてください。</p>
      <textarea id="csvInput" placeholder="送信日時	名前	対象週	月	火	水	木	金	土	日	備考
2026/5/5 10:30	田中花子	5/11 〜 5/17	9時〜17時	休み	休み	休み	休み	休み	休み	"></textarea>
      <button class="btn-parse" id="btnParse">✅ 読み込む</button>
    </div>
  </details>
</div>

<div class="main">
  <div class="summary-strip" id="summaryStrip" style="display:none">
    <div class="summary-card orange">
      <div class="sc-label">出勤スタッフ数</div>
      <div class="sc-value" id="scWorking">0</div>
    </div>
    <div class="summary-card purple">
      <div class="sc-label">延べシフト数</div>
      <div class="sc-value" id="scTotal">0</div>
    </div>
    <div class="summary-card green">
      <div class="sc-label">最も多い曜日</div>
      <div class="sc-value" id="scBusiest">-</div>
    </div>
  </div>

  <div class="days-grid" id="daysGrid">
    <div class="empty-msg" style="grid-column:1/-1">
      ⬆️ 上からデータを読み込むと、ここにシフト一覧が表示されます
    </div>
  </div>
</div>

<script>
  const GAS_READ_URL = "https://script.google.com/macros/s/AKfycbyAFnEb2cPUgFFuXW9vrboq3xv7W1BoSZhmHw9xGHb_Y4H2XGNzhu8bWNvhUebmArsQ/exec";

  const DAY_NAMES = ['月','火','水','木','金','土','日'];
  const DAY_CLASS = ['','','','','','day-sat','day-sun'];

  // 日本の祝日（2025〜2026年）
  const HOLIDAYS = new Set([
    '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
    '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
    '2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
    '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
    '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
    '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
    '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
    '2026-10-12','2026-11-03','2026-11-23',
  ]);

  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // 今日+2週間の月曜（日曜23:59締切）
  function calcDefaultOffset() {
    const now = new Date();
    const dow = now.getDay();
    const isSunAfterDeadline = dow === 0 && (now.getHours() > 23 || (now.getHours() === 23 && now.getMinutes() >= 59));
    return isSunAfterDeadline ? 3 : 2;
  }

  let weekOffset = calcDefaultOffset();
  let allData = [];

  function getWeekStart(offset) {
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - now.getDay() + 1 + offset * 7);
    mon.setHours(0,0,0,0);
    return mon;
  }

  function getWeekLabel(offset) {
    const mon = getWeekStart(offset);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return `${mon.getMonth()+1}/${mon.getDate()} 〜 ${sun.getMonth()+1}/${sun.getDate()}`;
  }

  // 締切 = 対象週の月曜 - 8日（2週前の日曜）23:59
  function getDeadlineText(offset) {
    const mon = getWeekStart(offset);
    const deadline = new Date(mon);
    deadline.setDate(mon.getDate() - 8);
    deadline.setHours(23, 59, 0, 0);

    const now = new Date();
    const diff = deadline - now;
    const dStr = `締切 ${deadline.getMonth()+1}/${deadline.getDate()}（日）23:59`;
    if (diff < 0) return { text: `⚠️ ${dStr} 過ぎています`, over: true };
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    if (days > 0) return { text: `⏰ ${dStr}（あと${days}日${hours}時間）`, over: false };
    const mins = Math.floor((diff % 3600000) / 60000);
    if (hours > 0) return { text: `⏰ ${dStr}（あと${hours}時間${mins}分）`, over: false };
    return { text: `⚠️ ${dStr}（あと${mins}分！）`, over: false };
  }

  function updateWeekHeader() {
    document.getElementById('weekLabel').textContent = getWeekLabel(weekOffset);
    const dl = getDeadlineText(weekOffset);
    const el = document.getElementById('weekDeadline');
    el.textContent = dl.text;
    el.className = 'week-deadline' + (dl.over ? ' over' : '');
  }

  // 同名上書き：同じ名前＋同じ週は最新1件のみ
  function deduplicateByName(data) {
    const map = new Map();
    data.forEach(r => {
      const key = `${r['名前']}__${r['対象週']}`;
      map.set(key, r);
    });
    return Array.from(map.values());
  }

  // 自動取得
  async function fetchData() {
    const btn = document.getElementById('btnFetch');
    btn.textContent = '🔄 取得中...';
    btn.disabled = true;
    try {
      const res = await fetch(GAS_READ_URL);
      const json = await res.json();
      if (Array.isArray(json) && json.length) {
        allData = deduplicateByName(json);
        updateWeekHeader();
        render();
        btn.textContent = '✅ 取得完了';
        setTimeout(() => { btn.textContent = '🔄 データ更新'; btn.disabled = false; }, 2000);
      } else {
        btn.textContent = '⚠️ データなし';
        btn.disabled = false;
      }
    } catch(e) {
      btn.textContent = '❌ 取得失敗';
      btn.disabled = false;
    }
  }

  function getDayDate(offset, dayIndex) {
    const mon = getWeekStart(offset);
    const d = new Date(mon); d.setDate(mon.getDate() + dayIndex);
    return { label: `${d.getMonth()+1}/${d.getDate()}`, dateObj: d };
  }

  function render() {
    const grid = document.getElementById('daysGrid');
    const strip = document.getElementById('summaryStrip');
    const currentWeek = getWeekLabel(weekOffset);

    // スプレッドシートの対象週と一致するものを抽出
    const rows = allData.filter(r => r['対象週'] === currentWeek);

    if (!rows.length) {
      grid.innerHTML = '<div class="empty-msg" style="grid-column:1/-1">この週のデータはまだありません</div>';
      strip.style.display = 'none';
      return;
    }

    strip.style.display = 'flex';
    const workingStaff = new Set();
    let totalShifts = 0;
    const dayCounts = {};
    grid.innerHTML = '';

    DAY_NAMES.forEach((day, di) => {
      const workers = rows.filter(r => r[day] && r[day] !== '休み');
      workers.forEach(w => workingStaff.add(w['名前']));
      totalShifts += workers.length;
      dayCounts[day] = workers.length;

      const { label: dateLabel, dateObj } = getDayDate(weekOffset, di);
      const isHol = dateObj && HOLIDAYS.has(fmtDate(dateObj));
      const holClass = isHol ? 'day-holiday' : '';

      const col = document.createElement('div');
      col.className = `day-col ${DAY_CLASS[di]} ${holClass}`;

      col.innerHTML = `
        <div class="day-header">
          <span class="day-count${workers.length===0?' zero':''}">${workers.length}人</span>
          <div class="day-name">${day}${isHol ? ' 🎌' : ''}</div>
          <div class="day-date">${dateLabel}</div>
        </div>
        <div class="staff-list" id="staff-${day}"></div>
      `;
      grid.appendChild(col);

      const list = col.querySelector(`#staff-${day}`);
      if (!workers.length) {
        list.innerHTML = '<div class="no-staff">お休み</div>';
      } else {
        workers.forEach((w, i) => {
          const item = document.createElement('div');
          item.className = 'staff-item';
          item.style.animationDelay = `${i * 0.05}s`;
          const times = (w[day] || '').split('/').map(t => t.trim()).join('<br>');
          const remarksBadge = w['備考'] ? `<span class="remarks-badge" data-name="${w['名前']}" data-remarks="${w['備考']}">📝 備考</span>` : '';
          item.innerHTML = `
            <div class="staff-name">
              <span class="staff-dot"></span>
              ${w['名前']}${remarksBadge}
            </div>
            <div class="shift-time">${times}</div>
          `;
          list.appendChild(item);
        });
      }
    });

    document.getElementById('scWorking').textContent = workingStaff.size;
    document.getElementById('scTotal').textContent = totalShifts;
    const busiest = Object.entries(dayCounts).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('scBusiest').textContent = busiest && busiest[1] > 0 ? busiest[0]+'曜' : '-';
  }

  // TSVパース
  function parseTSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split('\t').map(h => h.trim());
    return lines.slice(1).map(line => {
      const cols = line.split('\t');
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
      return obj;
    }).filter(r => r['名前']);
  }

  document.getElementById('btnParse').addEventListener('click', () => {
    const text = document.getElementById('csvInput').value.trim();
    if (!text) return;
    const parsed = parseTSV(text);
    if (!parsed.length) { alert('データを正しく読み込めませんでした。'); return; }
    allData = deduplicateByName(parsed);
    updateWeekHeader();
    render();
    document.querySelector('details').removeAttribute('open');
  });

  // 備考モーダル
  function openModal(name, remarks) {
    document.getElementById('modalName').textContent = name;
    document.getElementById('modalText').textContent = remarks;
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('daysGrid').addEventListener('click', e => {
    const badge = e.target.closest('.remarks-badge');
    if (badge) openModal(badge.dataset.name, badge.dataset.remarks);
  });

  document.getElementById('btnPrev').addEventListener('click', () => { weekOffset--; updateWeekHeader(); render(); });
  document.getElementById('btnNext').addEventListener('click', () => { weekOffset++; updateWeekHeader(); render(); });
  document.getElementById('btnFetch').addEventListener('click', fetchData);

  // ページ読み込み時
  updateWeekHeader();
  fetchData();
</script>
</body>
</html>
