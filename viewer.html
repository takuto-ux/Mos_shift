<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理ビューワー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F6FA;
    --card: #FFFFFF;
    --surface: #F9FAFB;
    --border: #E5E7EB;
    --primary: #E07B39;
    --accent: #4F6FE8;
    --green: #22C55E;
    --red: #EF4444;
    --text: #1F2937;
    --muted: #6B7280;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ヘッダー */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 28px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); letter-spacing: .04em; }
  .logo span { color: var(--text); }

  .week-nav { display: flex; align-items: center; gap: 10px; }
  .week-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 50%; width: 38px; height: 38px; font-size: 1rem; cursor: pointer; color: var(--primary); font-weight: 700; display: flex; align-items: center; justify-content: center; transition: background .2s; }
  .week-btn:hover { background: #FFF0E6; border-color: var(--primary); }
  .week-info { text-align: center; min-width: 180px; }
  .week-sel-value { font-size: 1rem; font-weight: 900; color: var(--text); display: block; }
  .week-deadline { font-size: .72rem; font-weight: 700; color: var(--primary); }
  .week-deadline.over { color: var(--red); }

  .btn-fetch { background: var(--primary); color: #fff; border: none; border-radius: 50px; padding: 9px 20px; font-size: .9rem; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: opacity .2s; white-space: nowrap; }
  .btn-fetch:hover { opacity: .85; }

  /* メイン */
  .main { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

  /* サマリー */
  .summary-strip { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 130px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; border-top: 3px solid var(--border); }
  .summary-card.orange { border-top-color: var(--primary); }
  .summary-card.blue   { border-top-color: var(--accent); }
  .summary-card.green  { border-top-color: var(--green); }
  .sc-label { font-size: .72rem; font-weight: 700; color: var(--muted); letter-spacing: .08em; margin-bottom: 6px; }
  .sc-value { font-size: 2rem; font-weight: 900; color: var(--text); line-height: 1; }
  .sc-value-names { font-size: .82rem; font-weight: 700; color: var(--red); line-height: 1.6; }
  .summary-card.orange .sc-value { color: var(--primary); }
  .summary-card.red .sc-value-names { color: var(--red); }
  .summary-card.green  .sc-value { color: var(--green); font-size: 1rem; line-height: 1.5; }

  /* 曜日グリッド */
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  @media (max-width: 900px) { .days-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 560px) { .days-grid { grid-template-columns: repeat(2, 1fr); } }

  .day-col { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .day-col:hover { box-shadow: var(--shadow-lg); }

  .day-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); text-align: center; position: relative; background: var(--surface); }
  .day-name { font-size: 1.3rem; font-weight: 900; color: var(--text); }
  .day-date { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .day-count { position: absolute; top: 10px; right: 10px; font-size: .68rem; font-weight: 900; background: var(--primary); color: #fff; border-radius: 50px; padding: 2px 7px; }
  .day-count.zero { background: var(--border); color: var(--muted); }

  .day-sun .day-header { background: #FEF2F2; }
  .day-sun .day-name { color: var(--red); }
  .day-sat .day-header { background: #EEF2FF; }
  .day-sat .day-name { color: var(--accent); }
  .day-holiday .day-header { background: #FEF2F2; }
  .day-holiday .day-name { color: var(--red); }

  /* 時間帯区分 */
  .time-band { border-bottom: 1px solid var(--border); }
  .time-band:last-child { border-bottom: none; }
  .band-label { font-size: .68rem; font-weight: 900; color: #fff; padding: 3px 10px; letter-spacing: .04em; }
  .band-morning  { background: #F59E0B; }
  .band-afternoon{ background: #3B82F6; }
  .band-evening  { background: #8B5CF6; }
  .band-anytime  { background: #22C55E; }
  .band-off      { background: #9CA3AF; }
  .off-item { opacity: .6; }
  .off-dot  { background: #9CA3AF !important; }
  .band-staff-list { padding: 6px 8px; display: flex; flex-direction: column; gap: 5px; min-height: 32px; }

  .staff-item { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 6px 9px; }
  .staff-name { font-size: .8rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .staff-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .shift-time { font-size: .72rem; color: var(--accent); font-weight: 700; margin-top: 2px; }
  .no-staff-band { font-size: .7rem; color: #CCC; padding: 4px 6px; font-style: italic; }

  /* コメントバッジ */
  .comment-badge { font-size: .62rem; font-weight: 700; background: #FFF0E6; color: var(--primary); border: 1px solid #FDD5B4; border-radius: 5px; padding: 1px 5px; cursor: pointer; transition: background .15s; }
  .comment-badge:hover { background: #FFE0CC; }

  /* 備考エリア（曜日下） */
  .day-remarks { padding: 8px 10px; border-top: 1px solid var(--border); background: #FFFBF7; }
  .day-remarks-title { font-size: .68rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; letter-spacing: .04em; }
  .remark-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .remark-row:last-child { border-bottom: none; }
  .remark-name { font-size: .75rem; font-weight: 700; color: var(--text); }
  .remark-btn { font-size: .65rem; background: #FFF0E6; color: var(--primary); border: 1px solid #FDD5B4; border-radius: 5px; padding: 1px 7px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: background .15s; }
  .remark-btn:hover { background: #FFE0CC; }

  /* モーダル */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border-radius: 20px; padding: 28px 24px; max-width: 380px; width: 100%; box-shadow: var(--shadow-lg); transform: scale(.93) translateY(8px); transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
  .modal-overlay.show .modal { transform: none; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-name { font-size: 1.1rem; font-weight: 900; color: var(--text); }
  .modal-close { background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px; color: var(--muted); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-label { font-size: .72rem; font-weight: 700; color: var(--primary); letter-spacing: .08em; margin-bottom: 8px; }
  .modal-text { font-size: .95rem; color: var(--text); line-height: 1.8; background: var(--surface); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); }

  /* 貼り付けエリア */
  .paste-section { max-width: 1200px; margin: 0 auto 20px; padding: 0 20px; }
  details { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  summary { padding: 14px 18px; cursor: pointer; font-weight: 700; font-size: .88rem; color: var(--muted); list-style: none; display: flex; align-items: center; gap: 8px; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: '▶'; font-size: .68rem; transition: transform .2s; }
  details[open] summary::before { transform: rotate(90deg); }
  .paste-inner { padding: 0 18px 18px; }
  .paste-inner p { font-size: .83rem; color: var(--muted); margin-bottom: 8px; }
  textarea#csvInput { width: 100%; height: 100px; font-family: monospace; font-size: .78rem; background: var(--surface); color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px; resize: vertical; outline: none; }
  .btn-parse { margin-top: 8px; background: var(--accent); color: #fff; border: none; border-radius: 50px; padding: 9px 22px; font-size: .88rem; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }

  .empty-msg { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 1rem; grid-column: 1/-1; }
</style>
</head>
<body>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-name" id="modalName"></div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-label">💬 コメント</div>
    <div class="modal-text" id="modalText"></div>
  </div>
</div>

<div class="header">
  <div class="header-inner">
    <div class="logo">SHIFT<span>VIEW</span></div>
    <div class="week-nav">
      <button class="week-btn" id="btnPrev">◀</button>
      <div class="week-info">
        <span class="week-sel-value" id="weekLabel">読み込み中...</span>
        <span class="week-deadline" id="weekDeadline"></span>
      </div>
      <button class="week-btn" id="btnNext">▶</button>
    </div>
    <button class="btn-fetch" id="btnFetch">🔄 データ更新</button>
  </div>
</div>

<div class="paste-section" style="margin-top:20px">
  <details>
    <summary>📋 スプレッドシートからデータを貼り付ける</summary>
    <div class="paste-inner">
      <p>Googleスプレッドシートの「シフト」シートを全選択（Ctrl+A）→ コピー（Ctrl+C）して貼り付けてください。</p>
      <textarea id="csvInput" placeholder="送信日時	名前	対象週	月	火..."></textarea>
      <button class="btn-parse" id="btnParse">✅ 読み込む</button>
    </div>
  </details>
</div>

<div class="main">
  <div class="summary-strip" id="summaryStrip" style="display:none">
    <div class="summary-card orange"><div class="sc-label">シフト提出人数</div><div class="sc-value" id="scWorking">0</div></div>
    <div class="summary-card red"><div class="sc-label">シフト未提出者</div><div class="sc-value-names" id="scMissing">-</div></div>
    <div class="summary-card green"><div class="sc-label">最も多い曜日</div><div class="sc-value" id="scBusiest">-</div></div>
  </div>
  <div class="days-grid" id="daysGrid">
    <div class="empty-msg">⬆️ データを更新するとシフト一覧が表示されます</div>
  </div>
  <!-- 週まとめ備考欄 -->
  <div id="weekRemarks" style="display:none; margin-top:20px; background:#fff; border:1px solid var(--border); border-radius:16px; padding:20px 24px; box-shadow:var(--shadow);">
    <div style="font-size:1rem; font-weight:900; color:var(--text); margin-bottom:14px;">📝 備考一覧</div>
    <div id="weekRemarksList"></div>
  </div>
</div>

<script>
  const GAS_READ_URL = "https://script.google.com/macros/s/AKfycbyAFnEb2cPUgFFuXW9vrboq3xv7W1BoSZhmHw9xGHb_Y4H2XGNzhu8bWNvhUebmArsQ/exec";
  const GAS_NAMES_URL = "https://script.google.com/macros/s/AKfycbxMLxzdVJLQH-IwfJ1jqCm3qhQpYiqzvSHKnBBW4KNSFCN1l8l9nTnydHkiSm12KCgiBw/exec";

  let allNames = []; // 名簿全員

  // 名簿をJSONPで取得
  function loadAllNames() {
    return new Promise((resolve) => {
      const callbackName = 'gasNamesViewerCb_' + Date.now();
      const timeout = setTimeout(() => {
        delete window[callbackName];
        script.remove();
        resolve();
      }, 8000);
      window[callbackName] = function(names) {
        clearTimeout(timeout);
        allNames = names;
        delete window[callbackName];
        script.remove();
        resolve();
      };
      const script = document.createElement('script');
      script.src = GAS_NAMES_URL + '?callback=' + callbackName;
      script.onerror = () => { clearTimeout(timeout); resolve(); };
      document.head.appendChild(script);
    });
  }
  const DAY_NAMES = ['月','火','水','木','金','土','日'];
  const DAY_CLASS = ['','','','','','day-sat','day-sun'];

  const HOLIDAYS = new Set([
    '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
    '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
    '2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
    '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
    '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
    '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
    '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
    '2026-10-12','2026-11-03','2026-11-23',
  ]);

  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // 月曜起点でoffset計算
  function getWeekStart(offset) {
    const today = new Date();
    const dow = today.getDay();
    const mon = new Date(today);
    mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
    mon.setHours(0,0,0,0);
    return mon;
  }

  function calcDefaultOffset() {
    const now = new Date();
    const dow = now.getDay();
    if (dow === 0) {
      const over = now.getHours() > 23 || (now.getHours() === 23 && now.getMinutes() >= 59);
      return over ? 4 : 3;
    }
    return 3; // 月〜土は常に+3週間
  }

  let weekOffset = calcDefaultOffset();
  let allData = [];

  function getWeekLabel(offset) {
    const mon = getWeekStart(offset);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return `${mon.getMonth()+1}/${mon.getDate()} 〜 ${sun.getMonth()+1}/${sun.getDate()}`;
  }

  function getDeadlineText(offset) {
    const mon = getWeekStart(offset);
    const deadline = new Date(mon);
    deadline.setDate(mon.getDate() - 15);
    deadline.setHours(23, 59, 0, 0);
    const now = new Date();
    const diff = deadline - now;
    const dStr = `締切 ${deadline.getMonth()+1}/${deadline.getDate()}（日）23:59`;
    if (diff < 0) return { text: `締め切りました`, over: true };
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    if (days > 0) return { text: `⏰ ${dStr}（あと${days}日${hours}時間）`, over: false };
    const mins = Math.floor((diff % 3600000) / 60000);
    return { text: `⚠️ ${dStr}（あと${hours}時間${mins}分）`, over: false };
  }

  function updateWeekHeader() {
    document.getElementById('weekLabel').textContent = getWeekLabel(weekOffset);
    const dl = getDeadlineText(weekOffset);
    const el = document.getElementById('weekDeadline');
    el.textContent = dl.text;
    el.className = 'week-deadline' + (dl.over ? ' over' : '');
  }

  function deduplicateByName(data) {
    const map = new Map();
    data.forEach(r => { map.set(`${r['名前']}__${r['対象週']}`, r); });
    return Array.from(map.values());
  }

  // 1つのスロット「9時〜17時」などから開始時間を取得
  function getSlotBand(slotStr) {
    if (!slotStr) return 'morning';
    const match = slotStr.match(/(\d+)時/);
    if (!match) return 'morning';
    const h = parseInt(match[1]);
    if (h < 16) return 'morning';
    if (h < 21) return 'afternoon';
    return 'evening';
  }

  // スロット文字列「16時〜24時(深夜)」を時間帯をまたぐ場合に複数バンドに分割
  // 例: "16時〜24時" → afternoon:["16時〜21時"], evening:["21時〜24時"]
  function splitSlotAcrossBands(slotStr) {
    const result = { morning: null, afternoon: null, evening: null };
    // ラストを24時に変換してから処理
    const normalized = slotStr.replace('ラスト', '24時');
    const m = normalized.match(/(\d+)時(?:\d+分)?[〜~](\d+)時/);
    if (!m) {
      const band = getSlotBand(slotStr);
      result[band] = slotStr;
      return result;
    }
    const start = parseInt(m[1]);
    const end   = parseInt(m[2]);
    const B1 = 16, B2 = 21;

    if (end <= B1 || start >= B2) {
      const band = start < B1 ? 'morning' : start < B2 ? 'afternoon' : 'evening';
      result[band] = slotStr;
    } else if (start < B1 && end > B1 && end <= B2) {
      result.morning   = `${start}時〜${B1}時`;
      result.afternoon = `${B1}時〜${end}時`;
    } else if (start < B1 && end > B2) {
      result.morning   = `${start}時〜${B1}時`;
      result.afternoon = `${B1}時〜${B2}時`;
      result.evening   = `${B2}時〜ラスト`;
    } else if (start >= B1 && start < B2 && end > B2) {
      result.afternoon = `${start}時〜${B2}時`;
      result.evening   = `${B2}時〜ラスト`;
    } else {
      const band = start < B1 ? 'morning' : start < B2 ? 'afternoon' : 'evening';
      result[band] = slotStr;
    }
    return result;
  }

  // スタッフの時間文字列を時間帯ごとに分解して返す
  function splitIntoBands(timeStr) {
    const result = { morning: [], afternoon: [], evening: [], all: [] };
    if (!timeStr || timeStr === '休み') return result;
    const cleaned = cleanTime(timeStr);
    if (cleaned.includes('いつでもOKです！') || cleaned.includes('いつでもOK')) {
      result.all.push('いつでもOK');
      return result;
    }
    const slots = cleaned.split('/').map(s => s.trim()).filter(Boolean);
    slots.forEach(slot => {
      const divided = splitSlotAcrossBands(slot);
      ['morning','afternoon','evening'].forEach(band => {
        if (divided[band]) result[band].push(divided[band]);
      });
    });
    return result;
  }

  // コメントを抽出（【コメント】形式）
  function extractComment(timeStr) {
    const match = timeStr && timeStr.match(/【(.+?)】/);
    return match ? match[1] : '';
  }

  function cleanTime(timeStr) {
    return timeStr ? timeStr.replace(/【.+?】/g, '').trim() : '';
  }

  async function fetchData() {
    const btn = document.getElementById('btnFetch');
    btn.textContent = '🔄 取得中...'; btn.disabled = true;
    try {
      const res = await fetch(GAS_READ_URL);
      const json = await res.json();
      if (Array.isArray(json) && json.length) {
        allData = deduplicateByName(json);
        updateWeekHeader(); render();
        btn.textContent = '✅ 取得完了';
        setTimeout(() => { btn.textContent = '🔄 データ更新'; btn.disabled = false; }, 2000);
      } else { btn.textContent = '⚠️ データなし'; btn.disabled = false; }
    } catch(e) { btn.textContent = '❌ 取得失敗'; btn.disabled = false; }
  }

  function render() {
    const grid = document.getElementById('daysGrid');
    const strip = document.getElementById('summaryStrip');
    const weekRemarksBox = document.getElementById('weekRemarks');
    const weekRemarksList = document.getElementById('weekRemarksList');
    const currentWeek = getWeekLabel(weekOffset);
    const rows = allData.filter(r => r['対象週'] === currentWeek);

    if (!rows.length) {
      grid.innerHTML = '<div class="empty-msg">この週のデータはまだありません</div>';
      strip.style.display = 'none';
      weekRemarksBox.style.display = 'none';
      return;
    }

    strip.style.display = 'flex';
    const workingStaff = new Set();
    let totalShifts = 0;
    const dayCounts = {};
    grid.innerHTML = '';

    DAY_NAMES.forEach((day, di) => {
      const workers = rows.filter(r => r[day] && r[day] !== '休み');
      const offStaff = rows.filter(r => !r[day] || r[day] === '休み');
      workers.forEach(w => workingStaff.add(w['名前']));
      totalShifts += workers.length;
      dayCounts[day] = workers.length;

      const mon = getWeekStart(weekOffset);
      const d = new Date(mon); d.setDate(mon.getDate() + di);
      const isHol = HOLIDAYS.has(fmtDate(d));
      const holClass = isHol ? 'day-holiday' : '';
      const dateLabel = `${d.getMonth()+1}/${d.getDate()}`;

      const col = document.createElement('div');
      col.className = `day-col ${DAY_CLASS[di]} ${holClass}`;

      // 時間帯別に分類（スロット単位）
      const bands = { morning: [], afternoon: [], evening: [], all: [] };
      workers.forEach(w => {
        const slotBands = splitIntoBands(w[day]);
        const comment = extractComment(w[day]);
        const commentBadge = comment ? `<span class="comment-badge" data-name="${w['名前']}" data-comment="${comment}">💬</span>` : '';
        ['morning','afternoon','evening','all'].forEach(band => {
          slotBands[band].forEach(slot => {
            bands[band].push({ name: w['名前'], slot, commentBadge });
          });
        });
      });

      const bandHTML = (label, cls, list, isAnytime=false) => {
        const items = list.map(item =>
          `<div class="staff-item">
            <div class="staff-name"><span class="staff-dot"></span>${item.name}${item.commentBadge}</div>
            <div class="shift-time">${isAnytime ? 'いつでもOK' : item.slot}</div>
          </div>`
        ).join('');
        return `<div class="time-band">
          <div class="band-label ${cls}">${label}</div>
          <div class="band-staff-list">${items || '<div class="no-staff-band">なし</div>'}</div>
        </div>`;
      };

      // 休みスタッフ欄
      const offHTML = offStaff.length ? `
        <div class="time-band">
          <div class="band-label band-off">休み</div>
          <div class="band-staff-list">
            ${offStaff.map(w => `
              <div class="staff-item off-item">
                <div class="staff-name"><span class="staff-dot off-dot"></span>${w['名前']}</div>
              </div>`).join('')}
          </div>
        </div>` : '';

      col.innerHTML = `
        <div class="day-header">
          <span class="day-count${workers.length===0?' zero':''}">${workers.length}人</span>
          <div class="day-name">${day}${isHol?' 🎌':''}</div>
          <div class="day-date">${dateLabel}</div>
        </div>
        ${bandHTML('8時〜15時台', 'band-morning', bands.morning)}
        ${bandHTML('16時〜20時台', 'band-afternoon', bands.afternoon)}
        ${bandHTML('21時以降', 'band-evening', bands.evening)}
        ${bandHTML('いつでもOK', 'band-anytime', bands.all, true)}
        ${offHTML}
      `;
      grid.appendChild(col);
    });

    // 名簿全員（GASから取得済みの場合は allNames を使用、なければ提出者から推定）
    const submittedNames = new Set(rows.map(r => r['名前']));
    const totalSubmitted = submittedNames.size;

    // 未提出者（allNamesがあれば使用）
    const missingNames = allNames.length > 0
      ? allNames.filter(n => !submittedNames.has(n))
      : [];

    // 最も多い曜日（同数の場合は全て表示）
    const maxCount = Math.max(...Object.values(dayCounts));
    const busiestDays = maxCount > 0
      ? Object.entries(dayCounts).filter(([,v]) => v === maxCount).map(([k]) => k+'曜')
      : [];

    document.getElementById('scWorking').textContent = `${totalSubmitted} / ${allNames.length || '?'}`;
    document.getElementById('scMissing').textContent = missingNames.length > 0 ? missingNames.join('、') : '全員提出済み ✅';
    document.getElementById('scBusiest').textContent = busiestDays.length > 0 ? busiestDays.join('・') : '-';

    // 週まとめ備考
    const remarkStaff = rows.filter(r => r['備考'] && r['備考'].trim());
    if (remarkStaff.length) {
      weekRemarksBox.style.display = 'block';
      weekRemarksList.innerHTML = remarkStaff.map(w => `
        <div class="remark-row">
          <span class="remark-name">${w['名前']}</span>
          <button class="remark-btn" data-name="${w['名前']}" data-remarks="${w['備考']}">備考を見る</button>
        </div>
      `).join('');
      weekRemarksList.querySelectorAll('.remark-btn').forEach(el => {
        el.addEventListener('click', () => openModal(el.dataset.name, el.dataset.remarks, '備考'));
      });
    } else {
      weekRemarksBox.style.display = 'none';
    }

    // コメントクリック
    grid.querySelectorAll('.comment-badge').forEach(el => {
      el.addEventListener('click', () => openModal(el.dataset.name, el.dataset.comment, 'コメント'));
    });
  }

  function parseTSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split('\t').map(h => h.trim());
    return lines.slice(1).map(line => {
      const cols = line.split('\t');
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
      return obj;
    }).filter(r => r['名前']);
  }

  document.getElementById('btnParse').addEventListener('click', () => {
    const text = document.getElementById('csvInput').value.trim();
    if (!text) return;
    const parsed = parseTSV(text);
    if (!parsed.length) { alert('データを正しく読み込めませんでした。'); return; }
    allData = deduplicateByName(parsed);
    updateWeekHeader(); render();
    document.querySelector('details').removeAttribute('open');
  });

  function openModal(name, text, type) {
    document.getElementById('modalName').textContent = name;
    document.getElementById('modalText').textContent = text;
    document.querySelector('.modal-label').textContent = type === '備考' ? '📝 備考' : '💬 コメント';
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  document.getElementById('btnPrev').addEventListener('click', () => { weekOffset--; updateWeekHeader(); render(); });
  document.getElementById('btnNext').addEventListener('click', () => { weekOffset++; updateWeekHeader(); render(); });
  document.getElementById('btnFetch').addEventListener('click', fetchData);

  updateWeekHeader();
  loadAllNames().then(() => fetchData());
</script>
</body>
</html>
